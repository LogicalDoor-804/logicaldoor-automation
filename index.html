<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LOGICALDOOR PRO DASH</title>
<!-- Paho MQTT Library Internet Control Ke Liye -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
<style>
:root {
  --bg-color: #0a0b0e;
  --panel-bg: rgba(20, 24, 36, 0.7);
  --border-color: rgba(0, 240, 255, 0.1);
  --primary: #ff3b30;
  --accent-cyan: #00f0ff;
  --accent-green: #2ecc71;
  --accent-orange: #ff9500;
  --text-main: #ffffff;
  --text-muted: #6b7c96;
}
body {
  background: var(--bg-color);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-align: center;
  margin: 0;
  padding: 15px;
  -webkit-tap-highlight-color: transparent;
}
.main-layout { max-width: 420px; margin: 0 auto; }
.header-box { margin: 20px 0; }
h1 {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 2px;
  margin: 0;
  background: linear-gradient(135deg, #00f0ff, #70a1ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
}
.subtitle { font-size: 10px; color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; margin-top: 6px; }
.card {
  background: var(--panel-bg);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid var(--border-color);
  padding: 20px 16px;
  margin-bottom: 16px;
  border-radius: 24px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.05);
}
.telemetry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.tel-card {
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.03);
  border-radius: 18px;
  padding: 14px;
  text-align: left;
}
.tel-label { font-size: 9px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.tel-val { font-size: 22px; font-weight: 800; margin-top: 4px; }
.tel-unit { font-size: 11px; color: var(--text-muted); font-weight: 400; }
.progress-bar { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.06); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-left: 4px solid var(--accent-cyan); }
#st { font-size: 16px; font-weight: 800; color: var(--accent-cyan); text-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }
h3 { font-size: 11px; font-weight: 800; text-align: left; margin: 0 0 14px 4px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
.btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
button {
  flex: 1;
  min-width: 120px;
  height: 54px;
  border: 1px solid rgba(255,255,255,0.02);
  border-radius: 16px;
  font-size: 13px;
  font-weight: 700;
  background: rgba(255, 255, 255, 0.04);
  color: #fff;
  cursor: pointer;
  transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
}
button:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.08); }
.btn-lock { border-bottom: 3px solid var(--primary); box-shadow: 0 4px 15px rgba(255,59,48,0.1); }
.btn-unlock { border-bottom: 3px solid var(--accent-green); box-shadow: 0 4px 15px rgba(46,204,113,0.1); }
.btn-action { border-bottom: 3px solid var(--accent-cyan); box-shadow: 0 4px 15px rgba(0,240,255,0.1); }
.sos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sos-main { grid-column: span 2; }
.btn-sos { border-bottom: 3px solid var(--accent-orange); box-shadow: 0 4px 15px rgba(255,149,0,0.1); }
.footer { margin: 35px 0 20px 0; color: #445164; font-size: 10px; letter-spacing: 1.5px; line-height: 1.6; }
.footer strong { color: #7f8c8d; }
</style>
<script>
// FREE Public MQTT Broker Settings
const MQTT_HOST = "broker.hivemq.com";
const MQTT_PORT = 8000; // WebSockets port
const TOPIC_CMD = "logicaldoor/zulfkar/cmd";

let mqttClient = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, "web_client_" + Math.random().toString(16).substr(2, 8));

mqttClient.onConnectionLost = function (responseObject) {
    console.log("Connection Lost. Reconnecting...");
    setTimeout(connectMQTT, 2000);
};

function connectMQTT() {
    mqttClient.connect({
        onSuccess: () => { console.log("Connected to MQTT Server!"); },
        onFailure: (err) => { console.log("Failed:", err); setTimeout(connectMQTT, 2000); },
        useSSL: false
    });
}
connectMQTT();

function send(cmd) {
  var stLabel = document.getElementById("st");
  stLabel.innerHTML = cmd;
  if(cmd.includes("LOCK") && !cmd.includes("UN")) {
    stLabel.style.color = "var(--primary)";
    stLabel.style.textShadow = "0 0 10px rgba(255,59,48,0.4)";
    simulateBike(false);
  } else if(cmd.includes("UNLOCK") || cmd.includes("ON")) {
    stLabel.style.color = "var(--accent-green)";
    stLabel.style.textShadow = "0 0 10px rgba(52,199,89,0.4)";
    if(cmd === "ENGINE_START") simulateBike(true);
  } else if(cmd.includes("SOS")) {
    stLabel.style.color = "var(--accent-orange)";
    stLabel.style.textShadow = "0 0 10px rgba(255,149,0,0.4)";
  } else {
    stLabel.style.color = "var(--accent-cyan)";
    stLabel.style.textShadow = "0 0 10px rgba(0, 240, 255, 0.4)";
  }

  // Internet ke zariye ESP ko command send karna
  if(mqttClient.isConnected()) {
      let message = new Paho.MQTT.Message(cmd);
      message.destinationName = TOPIC_CMD;
      mqttClient.send(message);
  }
}

let simInterval = null;
function simulateBike(isRunning) {
  clearInterval(simInterval);
  if(!isRunning) {
    document.getElementById("speed").innerText = "0";
    document.getElementById("speed-bar").style.width = "0%";
    return;
  }
  simInterval = setInterval(() => {
    let speed = Math.floor(48 + Math.random() * 22);
    document.getElementById("speed").innerText = speed;
    document.getElementById("speed-bar").style.width = (speed/140)*100 + "%";
  }, 750);
}
</script>
</head>
<body>
<div class="main-layout">
  <div class="header-box">
    <h1>LogicalDoor</h1>
    <div class="subtitle">Smart Telematics Console (CLOUD)</div>
  </div>
  <!-- Telemetry structure is same as original -->
  <div class="telemetry-grid">
    <div class="tel-card"><div class="tel-label">Live Speed</div><div class="tel-val"><span id="speed">0</span> <span class="tel-unit">km/h</span></div><div class="progress-bar"><div id="speed-bar" class="progress-fill" style="width:0%; background:var(--accent-cyan)"></div></div></div>
    <div class="tel-card"><div class="tel-label">Fuel Level</div><div class="tel-val">84 <span class="tel-unit">%</span></div><div class="progress-bar"><div class="progress-fill" style="width:84%; background:var(--accent-green)"></div></div></div>
    <div class="tel-card"><div class="tel-label">Estimated Range</div><div class="tel-val">268 <span class="tel-unit">km</span></div><div class="progress-bar"><div class="progress-fill" style="width:70%; background:#f1c40f"></div></div></div>
    <div class="tel-card"><div class="tel-label">Air Filter Status</div><div class="tel-val">96 <span class="tel-unit">%</span></div><div class="progress-bar"><div class="progress-fill" style="width:96%; background:var(--accent-cyan)"></div></div></div>
  </div>
  <div class="card status-bar"><span class="tel-label" style="font-size:11px;">System State</span><span id="st">READY</span></div>
  <div class="card"><h3>Ignition Control</h3><div class="btn-group"><button class="btn-lock" onclick="send('LOCK')">🔒 LOCK</button><button class="btn-unlock" onclick="send('UNLOCK')">🔓 UNLOCK</button></div></div>
  <div class="card"><h3>Quick Actions</h3><div class="btn-group"><button class="btn-action" onclick="send('HONK')">📯 HORN ALERT</button><button class="btn-action" onclick="send('ENGINE_START')">⚡ START ENGINE</button></div></div>
  <div class="card"><h3>Anti Theft System</h3><div class="btn-group"><button class="btn-unlock" onclick="send('SELF_ON')">ARM SYSTEM</button><button class="btn-lock" onclick="send('SELF_OFF')">DISARM (SLEEP)</button></div></div>
  <div class="card"><h3>Emergency SOS Mode</h3><div class="sos-grid"><button class="btn-sos sos-main" onclick="send('SOS_ON')">🚨 ACTIVATE SOS</button><button class="btn-sos sos-main" style="border-bottom-color:#555;" onclick="send('SOS_OFF')">❌ DEACTIVATE SOS</button></div></div>
  <div class="footer">LOGICALDOOR TELEMATICS LABS<br>Designed & Developed by <strong>Zulfkar Hussain</strong></div>
</div>
</body>
</html>
